<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101112" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DALER OS" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>DALER OS</title>
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem("daler-os-theme") === "light" ? "light" : "dark";
        document.querySelector('meta[name="theme-color"]').content = document.documentElement.dataset.theme === "light" ? "#f2f4f2" : "#101112";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <style>
      html, body { margin: 0; background: #101112; }
      html[data-theme="light"], html[data-theme="light"] body { background: #f2f4f2; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
